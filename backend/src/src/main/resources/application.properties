# ===============================
# CONFIGURACIÓN DE HIBERNATE (ORM)
# ===============================
# 'update' hace que Spring Boot cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Esto te mostrará en la terminal los comandos SQL que se ejecutan por debajo
spring.jpa.show-sql=true

app.cotizaciones.dir=./uploads

# ===============================
# LÍMITE DE SUBIDA DE ARCHIVOS
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# CONNECTION POOL (HikariCP)
# ===============================
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5